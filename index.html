<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETFLYX - Premium Video Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #0047FF; 
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            padding-bottom: 70px; 
        }

        .navbar {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 71, 255, 0.3);
        }

        .video-info-box {
            background: #0000CD; 
            padding: 15px;
            border-radius: 0 0 8px 8px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .action-item {
            background: #0000CD;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 5px;
            font-size: 0.65rem;
            transition: 0.3s;
            cursor: pointer;
        }

        .action-item:hover { background: var(--primary-blue); }

        .movie-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .movie-card:hover { transform: translateY(-5px); }

        /* Video Player Styling */
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            aspect-ratio: 16/9;
        }

        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
        }

        .sticky-footer-ad {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: black;
            z-index: 1000;
            border-top: 1px solid var(--primary-blue);
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

    <nav class="navbar fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center">
        <div class="logo text-2xl font-bold text-blue-600 tracking-wider" style="font-family: 'Bebas Neue';">NETFLYX</div>
        <div class="flex gap-6 text-sm font-medium">
            <a href="#" class="hover:text-blue-500">ပင်မစာမျက်နှာ</a>
            <a href="#mylist" class="hover:text-blue-500">သိမ်းထားမှုများ</a>
        </div>
        <button onclick="location.reload()" class="bg-blue-700 px-3 py-1 rounded text-xs">ထွက်ရန်</button>
    </nav>

    <div class="pt-24 px-4 max-w-7xl mx-auto">
        <div class="mb-8">
            <h2 class="text-xl font-bold border-l-4 border-blue-600 pl-3 mb-6">အသစ်တင်ထားသော ဗီဒီယိုများ</h2>
            <div id="userMovieGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black/95 z-[60] hidden overflow-y-auto pt-10 px-2 pb-20">
        <div class="max-w-3xl mx-auto">
            <div class="flex justify-end mb-2">
                <button onclick="closeModal()" class="text-3xl text-gray-400">&times;</button>
            </div>

            <div class="video-container rounded-t-lg overflow-hidden border border-white/10">
                <iframe id="videoPlayer" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
            </div>

            <div class="video-info-box">
                <h2 id="detailTitle" class="text-lg font-semibold mb-1">Loading Title...</h2>
                <p id="detailQuality" class="text-xs text-blue-300 mb-4">1080p</p>

                <div class="action-grid mb-4">
                    <div class="action-item"><i class="fas fa-star text-yellow-400"></i><span id="detailRating">0.0</span></div>
                    <div class="action-item" onclick="updateStat('likes')"><i class="fas fa-thumbs-up"></i><span id="detailLikes">0</span></div>
                    <div class="action-item" onclick="updateStat('dislikes')"><i class="fas fa-thumbs-down"></i><span id="detailDislikes">0</span></div>
                    <div class="action-item"><i class="fas fa-comment"></i><span id="detailComments">0</span></div>
                    <div class="action-item" onclick="addToWatchlist()"><i class="fas fa-plus"></i><span>LIST</span></div>
                    <div class="action-item" onclick="downloadMovie()"><i class="fas fa-download"></i><span>SAVE</span></div>
                    <div class="action-item" onclick="shareMovie()"><i class="fas fa-share"></i><span>SHARE</span></div>
                </div>

                <p id="detailDesc" class="text-xs text-blue-100 opacity-80 leading-relaxed"></p>
            </div>

            <div class="mt-6 px-2">
                <h3 class="text-sm font-bold mb-4">Comments</h3>
                <div class="flex gap-2 mb-4">
                    <input id="commentInput" type="text" placeholder="မှတ်ချက်ပေးရန်..." class="bg-white/5 border border-white/10 rounded w-full px-3 py-2 text-sm outline-none">
                    <button onclick="postComment()" class="bg-blue-600 px-4 py-2 rounded text-xs font-bold">POST</button>
                </div>
                <div id="commentsList" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <div class="sticky-footer-ad">
        <script type="text/javascript">
            atOptions = { 'key' : '1f368fdf67bf1944d873877b1354fd14', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/1f368fdf67bf1944d873877b1354fd14/invoke.js"></script>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqjq2JPRr7CRx6qvueqREeVc-wq5zQ0RU",
            authDomain: "movie-app-project-c952d.firebaseapp.com",
            projectId: "movie-app-project-c952d",
            storageBucket: "movie-app-project-c952d.firebasestorage.app",
            messagingSenderId: "280568179983",
            appId: "1:280568179983:web:4ca68ecc6e14127d6c627a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "movies");
        let allMovies = [];
        window.currentMovie = null;

        async function fetchMovies() {
            const snap = await getDocs(query(collection(db, "Movies"), orderBy("createdAt", "desc")));
            allMovies = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('userMovieGrid');
            grid.innerHTML = allMovies.map(movie => `
                <div class="movie-card cursor-pointer" onclick="openMovie('${movie.id}')">
                    <img src="${movie.poster}" class="aspect-[2/3] object-cover w-full">
                    <div class="p-2">
                        <h3 class="text-[11px] font-medium truncate">${movie.title}</h3>
                        <div class="flex justify-between text-[10px] text-gray-400 mt-1">
                            <span>${movie.views || 0} views</span>
                            <span class="text-yellow-500">★ ${movie.rating || '0.0'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.openMovie = function(id) {
            const movie = allMovies.find(m => m.id === id);
            window.currentMovie = movie;
            
            document.getElementById('detailTitle').textContent = movie.title;
            document.getElementById('detailDesc').textContent = movie.description || 'ဖော်ပြချက်မရှိပါ။';
            document.getElementById('detailRating').textContent = movie.rating || '0.0';
            document.getElementById('detailQuality').textContent = movie.quality || '1080p';

            // Video URL Logic (Google Drive Fix)
            let videoUrl = movie.url;
            if (videoUrl.includes('drive.google.com')) {
                const fileId = videoUrl.match(/[-\w]{25,}/);
                if (fileId) videoUrl = `https://drive.google.com/file/d/${fileId[0]}/preview`;
            }
            
            document.getElementById('videoPlayer').src = videoUrl;
            document.getElementById('detailModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = function() {
            document.getElementById('detailModal').classList.add('hidden');
            document.getElementById('videoPlayer').src = '';
            document.body.style.overflow = 'auto';
        };

        // Direct Download Logic
        window.downloadMovie = function() {
            if (!window.currentMovie) return;
            let dlUrl = window.currentMovie.url;
            if (dlUrl.includes('drive.google.com')) {
                const id = dlUrl.match(/[-\w]{25,}/);
                if (id) dlUrl = `https://drive.google.com/uc?export=download&id=${id[0]}`;
            }
            window.open(dlUrl, '_blank');
        };

        fetchMovies();
    </script>

    <script>
        function updateStat(id) {
            const el = document.getElementById('detail' + id.charAt(0).toUpperCase() + id.slice(1));
            el.textContent = parseInt(el.textContent) + 1;
        }

        function postComment() {
            const input = document.getElementById('commentInput');
            if (!input.value) return;
            const div = document.createElement('div');
            div.className = 'text-xs bg-white/5 p-2 rounded';
            div.innerHTML = `<span class="text-blue-400">User:</span> ${input.value}`;
            document.getElementById('commentsList').prepend(div);
            input.value = '';
        }

        function shareMovie() {
            navigator.clipboard.writeText(window.location.href);
            alert("Link copied to clipboard!");
        }
    </script>
</body>
</html>
