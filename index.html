<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>movieshd.com</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root { 
            --primary-blue: #0047FF; 
            --dark-bg: #000000; /* နောက်ခံ အနက်ရောင်အစစ် */
            --card-bg: #111111; 
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--dark-bg); 
            color: white; 
            padding-bottom: 80px; 
        }

        /* Video Player Wrapper - Google Drive Button ကိုဖျောက်ပြီး Zoom effect ရအောင်လုပ်ထားသည် */
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        #videoPlayer {
            position: absolute;
            top: -45px; /* အပေါ်က Drive bar ကို ဖျောက်ထားသည် */
            left: 0;
            width: 100%;
            height: calc(100% + 45px);
            border: none;
        }

        /* Custom UI Elements */
        .navbar { background: rgba(0, 0, 0, 0.9); border-bottom: 1px solid #222; }
        .action-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #222; }
        .action-item { background: #0000CD; padding: 12px 2px; text-align: center; cursor: pointer; font-size: 0.6rem; transition: 0.2s; }
        .action-item:active { background: var(--primary-blue); }
        .movie-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid #1a1a1a; }
        
        /* Sticky Footer for Ad */
        .sticky-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000;
            z-index: 100;
            border-top: 1px solid #333;
            display: flex;
            justify-content: center;
            padding: 5px 0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="navbar fixed top-0 w-full z-50 px-5 py-4 flex justify-between items-center">
        <div class="logo text-2xl font-bold text-blue-600" style="font-family: 'Bebas Neue';">MoviesHD</div>
        <button onclick="location.reload()" class="text-xs bg-gray-800 px-3 py-1 rounded">Refresh</button>
    </nav>

    <div class="pt-24 px-4 flex justify-center">
        <script>
            atOptions = { 'key' : '6cfd6ba4cb1663bcdb7237e97b853fa8', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script src="https://www.highperformanceformat.com/6cfd6ba4cb1663bcdb7237e97b853fa8/invoke.js"></script>
    </div>

    <div class="p-4 max-w-7xl mx-auto">
        <h2 class="text-lg font-bold mb-5 border-l-4 border-blue-600 pl-3">ဗီဒီယိုအသစ်များ</h2>
        <div id="movieGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </div>

    <div id="videoModal" class="fixed inset-0 bg-black z-[60] hidden overflow-y-auto">
        <div class="max-w-4xl mx-auto pb-20">
            <div class="p-4 flex justify-between items-center">
                <span class="text-sm font-medium truncate w-48" id="mTitle">Video Player</span>
                <button onclick="closeVideo()" class="text-3xl">&times;</button>
            </div>

            <div class="video-container shadow-2xl">
                <iframe id="videoPlayer" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>

            <div class="py-4 flex justify-center bg-[#050505]">
                <script async="async" data-cfasync="false" src="https://pl29254218.profitablecpmratenetwork.com/09c04ca36f449b67714bdf8401fe1776/invoke.js"></script>
                <div id="container-09c04ca36f449b67714bdf8401fe1776"></div>
            </div>

            <div class="bg-blue-800 p-4">
                <div class="action-grid mb-4 border border-blue-400">
                    <div class="action-item"><i class="fas fa-star text-yellow-400 block mb-1"></i>RATE</div>
                    <div class="action-item"><i class="fas fa-thumbs-up block mb-1"></i>LIKE</div>
                    <div class="action-item"><i class="fas fa-thumbs-down block mb-1"></i>DISLIKE</div>
                    <div class="action-item"><i class="fas fa-plus block mb-1"></i>LIST</div>
                    <div class="action-item" onclick="downloadVid()"><i class="fas fa-download block mb-1"></i>SAVE</div>
                    <div class="action-item" onclick="shareVid()"><i class="fas fa-share block mb-1"></i>SHARE</div>
                    <div class="action-item" onclick="toggleZoom()"><i class="fas fa-expand block mb-1"></i>ZOOM</div>
                </div>
                <p id="mDesc" class="text-xs text-white/80 leading-relaxed"></p>
            </div>

            <div class="p-4">
                <h3 class="text-sm font-bold mb-4">ဆက်စပ်ဗီဒီယိုများ</h3>
                <div id="relatedGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
            </div>

            <div class="p-4 border-t border-white/10 mt-5">
                <h3 class="text-sm font-bold mb-3">မှတ်ချက်များ</h3>
                <div class="flex gap-2 mb-5">
                    <input id="cInput" type="text" placeholder="တစ်ခုခုရေးပါ..." class="bg-white/10 border-none rounded-l w-full px-3 py-2 text-sm outline-none">
                    <button onclick="addComment()" class="bg-blue-600 px-4 rounded-r text-xs">တင်မည်</button>
                </div>
                <div id="cList" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <div class="sticky-footer">
        <script>
            atOptions = { 'key' : '6cfd6ba4cb1663bcdb7237e97b853fa8', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script src="https://www.highperformanceformat.com/6cfd6ba4cb1663bcdb7237e97b853fa8/invoke.js"></script>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqjq2JPRr7CRx6qvueqREeVc-wq5zQ0RU",
            authDomain: "movie-app-project-c952d.firebaseapp.com",
            projectId: "movie-app-project-c952d",
            storageBucket: "movie-app-project-c952d.firebasestorage.app",
            messagingSenderId: "280568179983",
            appId: "1:280568179983:web:4ca68ecc6e14127d6c627a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "movies");
        let allVids = [];
        let commentData = {};

        async function loadMovies() {
            const snap = await getDocs(query(collection(db, "Movies"), orderBy("createdAt", "desc")));
            allVids = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            render(allVids, 'movieGrid');
        }

        function render(data, target) {
            const el = document.getElementById(target);
            el.innerHTML = data.map(v => `
                <div class="movie-card" onclick="openVideo('${v.id}')">
                    <img src="${v.poster}" class="aspect-[2/3] object-cover w-full">
                    <div class="p-2">
                        <h3 class="text-[10px] font-medium truncate">${v.title}</h3>
                        <p class="text-[9px] text-gray-500 mt-1">1080p • Free</p>
                    </div>
                </div>
            `).join('');
        }

        window.openVideo = function(id) {
            const vid = allVids.find(v => v.id === id);
            window.currentVid = vid;
            document.getElementById('mTitle').textContent = vid.title;
            document.getElementById('mDesc').textContent = vid.description || 'No description available.';
            
            let url = vid.url;
            if(url.includes('drive.google.com')) {
                const fid = url.match(/[-\w]{25,}/);
                url = `https://drive.google.com/file/d/${fid[0]}/preview`;
            }
            document.getElementById('videoPlayer').src = url;

            render(allVids.filter(v => v.id !== id), 'relatedGrid');
            showComments(id);

            document.getElementById('videoModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        };

        window.closeVideo = function() {
            document.getElementById('videoModal').classList.add('hidden');
            document.getElementById('videoPlayer').src = '';
            document.body.style.overflow = 'auto';
        };

        window.addComment = function() {
            const inp = document.getElementById('cInput');
            if(!inp.value) return;
            const vidId = window.currentVid.id;
            if(!commentData[vidId]) commentData[vidId] = [];
            commentData[vidId].unshift(inp.value);
            inp.value = '';
            showComments(vidId);
        };

        function showComments(id) {
            const list = document.getElementById('cList');
            const items = commentData[id] || [];
            list.innerHTML = items.map(t => `<div class="text-[11px] bg-white/5 p-2 rounded border-l-2 border-blue-500">${t}</div>`).join('');
        }

        window.downloadVid = function() {
            let link = window.currentVid.url;
            if(link.includes('drive.google.com')) {
                const fid = link.match(/[-\w]{25,}/);
                link = `https://drive.google.com/uc?export=download&id=${fid[0]}`;
            }
            window.location.href = link;
        };

        window.toggleZoom = function() {
            const frame = document.getElementById('videoPlayer');
            if (frame.requestFullscreen) frame.requestFullscreen();
            else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
        };

        loadMovies();
    </script>

    <script>
        function shareVid() {
            navigator.clipboard.writeText(window.location.href);
            alert("Link copied!");
        }
    </script>
</body>
</html>
